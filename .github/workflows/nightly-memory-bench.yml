name: Nightly Memory Benchmark

on:
  schedule:
    - cron: "0 2 * * *"  # 2 AM UTC daily
  workflow_dispatch:
    inputs:
      fail_on_regression:
        description: "Fail if quality regression detected"
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  nightly-bench:
    name: Nightly quality + drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet "sqlite-vec>=0.1.1" "mcp[cli]>=1.2.0,<2.0" "pyyaml>=6.0"

      - name: Restore baseline metrics (if exists)
        id: restore-baseline
        uses: actions/cache/restore@v5
        with:
          path: /tmp/bench-baseline.json
          key: bench-baseline-${{ github.ref_name }}
          restore-keys: |
            bench-baseline-

      - name: Install Mnemo to temp dir
        run: |
          mkdir -p /tmp/mnemo-nightly
          node bin/mnemo.js --yes --repo-root /tmp/mnemo-nightly --project-name NightlyBench

      - name: Run benchmark
        id: benchmark
        run: |
          set +e
          cd /tmp/mnemo-nightly
          python3 $GITHUB_WORKSPACE/tests/retrieval/benchmark_runner.py \
            --fixtures $GITHUB_WORKSPACE/tests/retrieval/fixtures/ \
            --persist-baseline /tmp/bench-current.json \
            --policy $GITHUB_WORKSPACE/scripts/memory/installer/templates/autonomy/policies.yaml
          status=$?
          echo "exit_code=$status" >> $GITHUB_OUTPUT
          exit 0
        continue-on-error: true

      - name: Drift check vs baseline
        if: steps.restore-baseline.outputs.cache-hit == 'true'
        run: |
          fail_flag=""
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.fail_on_regression }}" = "true" ]; then
            fail_flag="--fail-on-regression"
          fi
          python3 $GITHUB_WORKSPACE/tests/retrieval/drift_check.py \
            --current /tmp/bench-current.json \
            --baseline /tmp/bench-baseline.json \
            --output /tmp/drift-report.json \
            $fail_flag

      - name: Promote current to baseline
        run: cp /tmp/bench-current.json /tmp/bench-baseline.json

      - name: Save baseline metrics
        uses: actions/cache/save@v5
        with:
          path: /tmp/bench-baseline.json
          key: bench-baseline-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bench-metrics-${{ github.run_id }}
          path: |
            /tmp/bench-current.json
            /tmp/drift-report.json
          retention-days: 30

      - name: Fail if benchmark command crashed
        if: always()
        run: |
          if [ "${{ steps.benchmark.outputs.exit_code }}" != "0" ]; then
            echo "ERROR: nightly benchmark command exited with code ${{ steps.benchmark.outputs.exit_code }}"
            exit 1
          fi

  modularization-nightly:
    name: Nightly installer inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Summarize installer entrypoints
        run: |
          echo "## Installer entrypoints" >> $GITHUB_STEP_SUMMARY
          wc -l bin/mnemo.js bin/installer/index.js | awk '{print "  "$1": "$2}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Module file inventory
        run: |
          echo "## Module files" >> $GITHUB_STEP_SUMMARY
          find bin/installer/ -type f | sort | while read f; do
            wc -l "$f" | awk '{print "  "$1": "$2}' >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Template files" >> $GITHUB_STEP_SUMMARY
          find scripts/memory/installer/templates/ -type f | sort | while read f; do
            wc -l "$f" | awk '{print "  "$1": "$2}' >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Autonomy template files" >> $GITHUB_STEP_SUMMARY
          find scripts/memory/installer/templates/autonomy/ -type f | sort >> $GITHUB_STEP_SUMMARY
