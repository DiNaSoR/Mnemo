name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Pre-flight checks ──────────────────────────────────────────────────────
  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract and validate version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: tag '$TAG' is not a valid release tag (expected vMAJOR.MINOR.PATCH)."
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG -> Version: $VERSION"

      - name: Verify VERSION file matches tag
        run: |
          FILE_VER="$(tr -d '[:space:]' < VERSION)"
          TAG_VER="${{ steps.version.outputs.version }}"
          if [ "$FILE_VER" != "$TAG_VER" ]; then
            echo "ERROR: VERSION file ($FILE_VER) does not match git tag ($TAG_VER)"
            echo "Update VERSION and push a new release tag."
            exit 1
          fi

      - name: Verify CHANGELOG has entry for this version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -qF "## [$VERSION]" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md has no entry for version $VERSION"
            echo "Add a ## [$VERSION] section before creating the release tag."
            exit 1
          fi

  # ─── Run regression tests before publishing ────────────────────────────────
  test-windows:
    name: Test Windows
    needs: preflight
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run regression tests
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tests\test-installer.ps1
      - name: Run modularization guard tests
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tests\test-installer-modularization.ps1

  test-posix:
    name: Test POSIX (${{ matrix.os }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Run regression tests
        run: sh ./tests/test-installer.sh

  autonomy-syntax:
    name: Autonomy module syntax (py3)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps for syntax check
        run: pip install --quiet pyyaml

      - name: Syntax check autonomy and retrieval Python files
        run: |
          failed=0
          for f in scripts/memory/installer/templates/autonomy/*.py; do
            if ! python3 -m py_compile "$f" 2>&1; then
              echo "SYNTAX ERROR: $f"
              failed=1
            fi
          done
          if [ -f scripts/memory/installer/templates/mnemo_vector.py ]; then
            python3 -m py_compile scripts/memory/installer/templates/mnemo_vector.py
          fi
          for f in tests/retrieval/*.py; do
            if ! python3 -m py_compile "$f" 2>&1; then
              echo "SYNTAX ERROR: $f"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "All Python files pass syntax check"

  # ─── Publish GitHub release ────────────────────────────────────────────────
  publish:
    name: Publish release
    needs: [preflight, test-windows, test-posix, autonomy-syntax]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify release artifacts exist
        run: |
          for f in memory.ps1 memory_mac.sh VERSION CHANGELOG.md README.md LICENSE; do
            if [ ! -f "$f" ]; then
              echo "ERROR: required release artifact missing: $f"
              exit 1
            fi
          done
          if [ ! -d "scripts/memory/installer" ]; then
            echo "ERROR: required installer module directory missing: scripts/memory/installer"
            exit 1
          fi

      - name: Extract changelog section for this release
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          # Extract lines between ## [VERSION] and the next ## [ header.
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "ERROR: extracted release notes are empty for version $VERSION"
            exit 1
          fi

          echo "Release notes:"
          cat release_notes.md

      - name: Build platform bundles
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          OUT_DIR="release-bundles"
          WIN_DIR="$OUT_DIR/mnemo-windows-v${VERSION}"
          MAC_DIR="$OUT_DIR/mnemo-macos-linux-v${VERSION}"

          rm -rf "$OUT_DIR"
          mkdir -p "$WIN_DIR" "$MAC_DIR"
          mkdir -p "$WIN_DIR/scripts/memory/installer" "$MAC_DIR/scripts/memory/installer"

          # Include full installer modules/templates required by both entrypoint scripts.
          cp -R scripts/memory/installer/. "$WIN_DIR/scripts/memory/installer/"
          cp -R scripts/memory/installer/. "$MAC_DIR/scripts/memory/installer/"

          # Platform-specific entrypoints + shared docs.
          cp memory.ps1 VERSION README.md CHANGELOG.md LICENSE "$WIN_DIR/"
          cp memory_mac.sh VERSION README.md CHANGELOG.md LICENSE "$MAC_DIR/"

          # One-click launcher for Windows users (double-click install.cmd).
          cat > "$WIN_DIR/install.cmd" <<'EOF'
          @echo off
          setlocal
          set SCRIPT_DIR=%~dp0
          powershell -ExecutionPolicy Bypass -File "%SCRIPT_DIR%memory.ps1" %*
          if ERRORLEVEL 1 (
            echo.
            echo Mnemo installer failed with exit code %ERRORLEVEL%.
            pause
            exit /b %ERRORLEVEL%
          )
          echo.
          echo Mnemo installer completed.
          pause
          EOF

          # One-click launcher for macOS users (double-click install.command).
          cat > "$MAC_DIR/install.command" <<'EOF'
          #!/bin/sh
          set -e
          SCRIPT_DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"
          sh "$SCRIPT_DIR/memory_mac.sh" "$@"
          EOF
          chmod +x "$MAC_DIR/install.command" "$MAC_DIR/memory_mac.sh"

          # Create zip bundles to publish in the GitHub release.
          (cd "$OUT_DIR" && zip -rq "../mnemo-windows-v${VERSION}.zip" "mnemo-windows-v${VERSION}")
          (cd "$OUT_DIR" && zip -rq "../mnemo-macos-linux-v${VERSION}.zip" "mnemo-macos-linux-v${VERSION}")

      - name: Generate release checksums
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          sha256sum \
            mnemo-windows-v${VERSION}.zip \
            mnemo-macos-linux-v${VERSION}.zip \
            memory.ps1 \
            memory_mac.sh \
            VERSION > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mnemo v${{ needs.preflight.outputs.version }}"
          body_path: release_notes.md
          files: |
            mnemo-windows-v${{ needs.preflight.outputs.version }}.zip
            mnemo-macos-linux-v${{ needs.preflight.outputs.version }}.zip
            checksums.txt
          draft: false
          prerelease: false

  # ─── Publish npm package ────────────────────────────────────────────────────
  publish-npm:
    name: Publish npm package (@dinasor/mnemo-cli)
    needs: [preflight, test-windows, test-posix, autonomy-syntax, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify NPM token is configured
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "ERROR: NPM_TOKEN secret is not configured."
            echo "Add an npm automation token in repo secrets to enable publish."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm package files exist
        run: |
          for f in package.json bin/mnemo.js memory.ps1 memory_mac.sh VERSION; do
            if [ ! -f "$f" ]; then
              echo "ERROR: required npm package file missing: $f"
              exit 1
            fi
          done
          if [ ! -d "scripts/memory/installer" ]; then
            echo "ERROR: required npm package directory missing: scripts/memory/installer"
            exit 1
          fi

      - name: Sync package version from release tag
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = process.env.VERSION;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "package.json version set to $VERSION"

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "Package ${PKG_NAME}@${VERSION} is already published; skipping."
            exit 0
          fi
          npm publish --access public
