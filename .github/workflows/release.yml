name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Pre-flight checks ──────────────────────────────────────────────────────
  preflight:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract and validate version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: tag '$TAG' is not a valid release tag (expected vMAJOR.MINOR.PATCH)."
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG -> Version: $VERSION"

      - name: Verify VERSION file matches tag
        run: |
          FILE_VER="$(tr -d '[:space:]' < VERSION)"
          TAG_VER="${{ steps.version.outputs.version }}"
          if [ "$FILE_VER" != "$TAG_VER" ]; then
            echo "ERROR: VERSION file ($FILE_VER) does not match git tag ($TAG_VER)"
            echo "Update VERSION and push a new release tag."
            exit 1
          fi

      - name: Verify CHANGELOG has entry for this version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -qF "## [$VERSION]" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md has no entry for version $VERSION"
            echo "Add a ## [$VERSION] section before creating the release tag."
            exit 1
          fi

  # ─── Run regression tests before publishing ────────────────────────────────
  test-windows:
    name: Test Windows
    needs: preflight
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --quiet "sqlite-vec>=0.1.1" "mcp[cli]>=1.2.0,<2.0" "pyyaml>=6.0"
      - name: Run Windows regression suite
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tests\test-installer.ps1
      - name: Run Windows modularization guard
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tests\test-installer-modularization.ps1

  test-posix:
    name: Test POSIX (${{ matrix.os }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"
      - name: Run regression tests
        run: sh ./tests/test-installer.sh

  autonomy-syntax:
    name: Autonomy module syntax (py3)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install minimal deps for syntax check
        run: pip install --quiet pyyaml

      - name: Syntax check autonomy and retrieval Python files
        run: |
          failed=0
          for f in scripts/memory/installer/templates/autonomy/*.py; do
            if ! python3 -m py_compile "$f" 2>&1; then
              echo "SYNTAX ERROR: $f"
              failed=1
            fi
          done
          if [ -f scripts/memory/installer/templates/mnemo_vector.py ]; then
            python3 -m py_compile scripts/memory/installer/templates/mnemo_vector.py
          fi
          for f in tests/retrieval/*.py; do
            if ! python3 -m py_compile "$f" 2>&1; then
              echo "SYNTAX ERROR: $f"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "All Python files pass syntax check"

  retrieval-quality:
    name: Retrieval quality + evaluation
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install dependencies
        run: pip install --quiet "sqlite-vec>=0.1.1" "mcp[cli]>=1.2.0,<2.0" "pyyaml>=6.0"

      - name: Install Mnemo to temp dir
        run: |
          mkdir -p /tmp/mnemo-release-bench
          node bin/mnemo.js --yes --repo-root /tmp/mnemo-release-bench --project-name ReleaseBench

      - name: Run benchmark
        working-directory: /tmp/mnemo-release-bench
        run: |
          python3 $GITHUB_WORKSPACE/tests/retrieval/benchmark_runner.py \
            --fixtures $GITHUB_WORKSPACE/tests/retrieval/fixtures/

      - name: Run benchmark ablation
        working-directory: /tmp/mnemo-release-bench
        run: |
          python3 $GITHUB_WORKSPACE/tests/retrieval/benchmark_runner.py \
            --fixtures $GITHUB_WORKSPACE/tests/retrieval/fixtures/ \
            --ablation

      - name: Run contradiction evaluation
        working-directory: /tmp/mnemo-release-bench
        run: |
          mkdir -p /tmp/mnemo-release-reports
          python3 $GITHUB_WORKSPACE/tests/retrieval/eval_contradiction.py \
            --by-category \
            --report-json /tmp/mnemo-release-reports/contradiction.json \
            --report-csv /tmp/mnemo-release-reports/contradiction.csv

      - name: Run weight sensitivity sweep
        working-directory: /tmp/mnemo-release-bench
        run: |
          python3 $GITHUB_WORKSPACE/tests/retrieval/weight_sweep.py \
            --curve-json /tmp/mnemo-release-reports/weight_curve.json \
            --curve-csv /tmp/mnemo-release-reports/weight_curve.csv

      - name: Upload release evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-eval-${{ github.run_id }}
          path: /tmp/mnemo-release-reports
          retention-days: 30

  package-smoke:
    name: Packaged npm tarball smoke
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Build tarball and verify packed install
        run: |
          pack_json="$(npm pack --json)"
          tarball="$(node -e "const data = JSON.parse(process.argv[1]); console.log(data[0].filename);" "$pack_json")"
          mkdir -p /tmp/mnemo-release-pack /tmp/mnemo-release-extract
          tar -xzf "$tarball" -C /tmp/mnemo-release-extract
          node /tmp/mnemo-release-extract/package/bin/mnemo.js --yes --repo-root /tmp/mnemo-release-pack --project-name ReleasePack
          test -f /tmp/mnemo-release-pack/.mnemo/memory/memo.md
          test -f /tmp/mnemo-release-pack/.githooks/pre-commit
          test -f /tmp/mnemo-release-pack/scripts/memory/add-lesson.sh
          test -f /tmp/mnemo-release-pack/scripts/memory/query-memory.sh
          test -f /tmp/mnemo-release-pack/scripts/memory/customization.md

  # ─── Publish GitHub release ────────────────────────────────────────────────
  publish:
    name: Publish release
    needs: [preflight, test-windows, test-posix, autonomy-syntax, retrieval-quality, package-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify release artifacts exist
        run: |
          for f in VERSION CHANGELOG.md README.md LICENSE bin/mnemo.js bin/installer/index.js; do
            if [ ! -f "$f" ]; then
              echo "ERROR: required release artifact missing: $f"
              exit 1
            fi
          done
          if [ ! -d "scripts/memory/installer" ]; then
            echo "ERROR: required installer module directory missing: scripts/memory/installer"
            exit 1
          fi

      - name: Extract changelog section for this release
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "ERROR: extracted release notes are empty for version $VERSION"
            exit 1
          fi

          echo "Release notes:"
          cat release_notes.md

      - name: Generate release checksums
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          sha256sum VERSION > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mnemo v${{ needs.preflight.outputs.version }}"
          body_path: release_notes.md
          files: |
            checksums.txt
          draft: false
          prerelease: false

  # ─── Publish npm package ────────────────────────────────────────────────────
  publish-npm:
    name: Publish npm package (@dinasor/mnemo-cli)
    needs: [preflight, test-windows, test-posix, autonomy-syntax, retrieval-quality, package-smoke, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify NPM token is configured
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "ERROR: NPM_TOKEN secret is not configured."
            echo "Add an npm automation token in repo secrets to enable publish."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm package files exist
        run: |
          for f in package.json bin/mnemo.js bin/installer/index.js VERSION; do
            if [ ! -f "$f" ]; then
              echo "ERROR: required npm package file missing: $f"
              exit 1
            fi
          done
          if [ ! -d "scripts/memory/installer" ]; then
            echo "ERROR: required npm package directory missing: scripts/memory/installer"
            exit 1
          fi

      - name: Sync package version from release tag
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = process.env.VERSION;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "package.json version set to $VERSION"

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Verify packed tarball installs cleanly
        run: |
          pack_json="$(npm pack --json)"
          tarball="$(node -e "const data = JSON.parse(process.argv[1]); console.log(data[0].filename);" "$pack_json")"
          mkdir -p /tmp/mnemo-publish-pack /tmp/mnemo-publish-extract
          tar -xzf "$tarball" -C /tmp/mnemo-publish-extract
          node /tmp/mnemo-publish-extract/package/bin/mnemo.js --yes --repo-root /tmp/mnemo-publish-pack --project-name PublishPack
          test -f /tmp/mnemo-publish-pack/.mnemo/memory/memo.md
          test -f /tmp/mnemo-publish-pack/.githooks/pre-commit
          test -f /tmp/mnemo-publish-pack/scripts/memory/add-lesson.sh
          test -f /tmp/mnemo-publish-pack/scripts/memory/query-memory.sh
          test -f /tmp/mnemo-publish-pack/scripts/memory/customization.md

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "Package ${PKG_NAME}@${VERSION} is already published; skipping."
            exit 0
          fi
          npm publish --access public
