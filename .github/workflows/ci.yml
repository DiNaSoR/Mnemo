name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─── Windows installer smoke tests ───────────────────────────────────────────
  windows:
    name: Windows regression (Node.js installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --quiet "sqlite-vec>=0.1.1" "mcp[cli]>=1.2.0,<2.0" "pyyaml>=6.0"

      - name: Run installer (scratch)
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "mnemo-test"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          node bin/mnemo.js --yes --repo-root $dest --project-name CITest
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Idempotency check (re-run without --force, expect SKIPs only)
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "mnemo-test"
          $out = node bin/mnemo.js --yes --repo-root $dest --project-name CITest 2>&1 | Out-String
          Write-Host $out
          if ($out -match "^WROTE:") {
            Write-Error "Idempotency failed: installer overwrote files on second run without --force"
            exit 1
          }

      - name: Idempotency check (re-run with --force, expect WROTEs)
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "mnemo-test"
          $out = node bin/mnemo.js --yes --repo-root $dest --project-name CITest --force 2>&1 | Out-String
          Write-Host $out
          if ($out -notmatch "WROTE:") {
            Write-Error "Force flag had no effect: no files were written."
            exit 1
          }

      - name: Dry-run check (no files created)
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "mnemo-dryrun"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          node bin/mnemo.js --yes --repo-root $dest --project-name CITest --dry-run
          $files = Get-ChildItem -Recurse -File $dest -ErrorAction SilentlyContinue
          if ($files) {
            Write-Error "Dry-run created files: $($files.FullName -join ', ')"
            exit 1
          }

      - name: Path-with-spaces test
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "mnemo with spaces"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          node bin/mnemo.js --yes --repo-root $dest --project-name CITest
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run full Windows regression suite
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tests\test-installer.ps1

      - name: Run Windows modularization guard
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tests\test-installer-modularization.ps1

  # ─── macOS / Linux installer smoke tests ─────────────────────────────────────
  posix:
    name: ${{ matrix.os }} (Node.js installer)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Run installer (scratch)
        run: |
          dest="$RUNNER_TEMP/mnemo-test"
          mkdir -p "$dest"
          node bin/mnemo.js --yes --repo-root "$dest" --project-name CITest

      - name: Idempotency check (re-run without --force, expect SKIPs only)
        run: |
          dest="$RUNNER_TEMP/mnemo-test"
          out="$(node bin/mnemo.js --yes --repo-root "$dest" --project-name CITest 2>&1)"
          echo "$out"
          if echo "$out" | grep -q "^WROTE:"; then
            echo "ERROR: Idempotency failed — installer overwrote files on second run without --force"
            exit 1
          fi

      - name: Idempotency check (re-run with --force, expect WROTEs)
        run: |
          dest="$RUNNER_TEMP/mnemo-test"
          out="$(node bin/mnemo.js --yes --repo-root "$dest" --project-name CITest --force 2>&1)"
          echo "$out"
          if ! echo "$out" | grep -q "WROTE:"; then
            echo "ERROR: --force had no effect — no files were written"
            exit 1
          fi

      - name: Dry-run check (no files created)
        run: |
          dest="$RUNNER_TEMP/mnemo-dryrun"
          mkdir -p "$dest"
          node bin/mnemo.js --yes --repo-root "$dest" --project-name CITest --dry-run
          count="$(find "$dest" -type f 2>/dev/null | wc -l | tr -d ' ')"
          if [ "$count" -gt 0 ]; then
            echo "ERROR: Dry-run created $count file(s)"
            find "$dest" -type f
            exit 1
          fi

      - name: Path-with-spaces test
        run: |
          dest="$RUNNER_TEMP/mnemo with spaces"
          mkdir -p "$dest"
          node bin/mnemo.js --yes --repo-root "$dest" --project-name CITest

      - name: Run full regression test suite
        run: sh ./tests/test-installer.sh

  # ─── Lint: VERSION file consistency ──────────────────────────────────────────
  version-check:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check VERSION file exists and is valid semver
        run: |
          version="$(cat VERSION | tr -d '[:space:]')"
          echo "VERSION = $version"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "ERROR: VERSION file does not contain a valid semver string"
            exit 1
          fi

      - name: Check CHANGELOG has an [Unreleased] or version entry
        run: |
          if ! grep -q '## \[' CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md has no version sections"
            exit 1
          fi

  # ─── Installer modularization guard ──────────────────────────────────────────
  modularization-guard:
    name: Node.js installer integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify required Node.js installer modules exist
        run: |
          for f in \
            bin/installer/index.js \
            bin/installer/core/paths.js \
            bin/installer/core/writer.js \
            bin/installer/core/template.js \
            bin/installer/core/bridge.js \
            bin/installer/features/scaffold.js \
            bin/installer/features/helperScripts.js \
            bin/installer/features/vectorSetup.js \
            bin/installer/features/mcpConfig.js \
            bin/installer/features/gitHooks.js \
            bin/installer/features/gitignore.js \
            bin/installer/features/bridges.js \
            bin/installer/features/legacyMigration.js; do
            if [ ! -f "$f" ]; then
              echo "FAIL: required installer module missing: $f"
              exit 1
            fi
          done
          echo "All Node.js installer modules present"

      - name: Verify content templates exist
        run: |
          for f in \
            scripts/memory/installer/templates/content/index.md \
            scripts/memory/installer/templates/content/hot-rules.md \
            scripts/memory/installer/templates/content/active-context.md \
            scripts/memory/installer/templates/content/memo.md.tmpl \
            scripts/memory/installer/templates/content/tag-vocabulary.md \
            scripts/memory/installer/templates/rules/00-memory-system.mdc.tmpl \
            scripts/memory/installer/templates/rules/00-memory-system-agent.md \
            scripts/memory/installer/templates/hooks/pre-commit.sh; do
            if [ ! -f "$f" ]; then
              echo "FAIL: content template missing: $f"
              exit 1
            fi
          done
          echo "All content templates present"

      - name: Verify autonomy template files exist
        run: |
          for f in \
            scripts/memory/installer/templates/autonomy/__init__.py \
            scripts/memory/installer/templates/autonomy/common.py \
            scripts/memory/installer/templates/autonomy/schema.py \
            scripts/memory/installer/templates/autonomy/runner.py \
            scripts/memory/installer/templates/autonomy/ingest_pipeline.py \
            scripts/memory/installer/templates/autonomy/lifecycle_engine.py \
            scripts/memory/installer/templates/autonomy/entity_resolver.py \
            scripts/memory/installer/templates/autonomy/contradiction.py \
            scripts/memory/installer/templates/autonomy/token_counter.py \
            scripts/memory/installer/templates/autonomy/retrieval_router.py \
            scripts/memory/installer/templates/autonomy/reranker.py \
            scripts/memory/installer/templates/autonomy/context_safety.py \
            scripts/memory/installer/templates/autonomy/vault_policy.py \
            scripts/memory/installer/templates/autonomy/policies.yaml; do
            if [ ! -f "$f" ]; then
              echo "FAIL: autonomy template missing: $f"
              exit 1
            fi
          done
          echo "All autonomy templates present"

  # ─── Node.js CLI smoke test ──────────────────────────────────────────────────
  cli-smoke:
    name: CLI smoke test (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: CLI --help exits 0
        run: node bin/mnemo.js --help

      - name: CLI --yes --dry-run exits 0
        run: |
          dest="$RUNNER_TEMP/cli-dryrun"
          mkdir -p "$dest"
          node bin/mnemo.js --yes --dry-run --repo-root "$dest"

      - name: CLI --yes full install exits 0
        run: |
          dest="$RUNNER_TEMP/cli-install"
          mkdir -p "$dest" && cd "$dest" && git init
          node "$GITHUB_WORKSPACE/bin/mnemo.js" --yes --repo-root "$dest" --project-name CLITest
          test -f "$dest/.mnemo/memory/hot-rules.md" || { echo "FAIL: core files missing"; exit 1; }

  # ─── Packaged tarball smoke test ────────────────────────────────────────────
  package-smoke:
    name: npm tarball install smoke
    runs-on: ubuntu-latest
    needs: [version-check]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Build tarball and install from packed artifact
        run: |
          mkdir -p /tmp/mnemo-pack-test
          pack_json="$(npm pack --json)"
          tarball="$(node -e "const data = JSON.parse(process.argv[1]); console.log(data[0].filename);" "$pack_json")"
          mkdir -p /tmp/mnemo-pack-extract /tmp/mnemo-pack-repo
          tar -xzf "$tarball" -C /tmp/mnemo-pack-extract
          node /tmp/mnemo-pack-extract/package/bin/mnemo.js --yes --repo-root /tmp/mnemo-pack-repo --project-name PackSmoke
          test -f /tmp/mnemo-pack-repo/.mnemo/memory/memo.md
          test -f /tmp/mnemo-pack-repo/.githooks/pre-commit
          test -f /tmp/mnemo-pack-repo/scripts/memory/add-lesson.sh
          test -f /tmp/mnemo-pack-repo/scripts/memory/query-memory.sh
          test -f /tmp/mnemo-pack-repo/scripts/memory/customization.md

  # ─── Retrieval quality benchmark ─────────────────────────────────────────────
  retrieval-quality:
    name: Retrieval quality + evaluation
    runs-on: ubuntu-latest
    needs: [version-check]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install dependencies
        run: pip install --quiet "sqlite-vec>=0.1.1" "mcp[cli]>=1.2.0,<2.0" "pyyaml>=6.0"

      - name: Install Mnemo to temp dir
        run: |
          mkdir -p /tmp/mnemo-bench
          node bin/mnemo.js --yes --repo-root /tmp/mnemo-bench --project-name BenchTest

      - name: Run benchmark (FTS mode, no API key required)
        working-directory: /tmp/mnemo-bench
        run: |
          python3 $GITHUB_WORKSPACE/tests/retrieval/benchmark_runner.py \
            --fixtures $GITHUB_WORKSPACE/tests/retrieval/fixtures/

      - name: Run benchmark ablation study
        working-directory: /tmp/mnemo-bench
        run: |
          python3 $GITHUB_WORKSPACE/tests/retrieval/benchmark_runner.py \
            --fixtures $GITHUB_WORKSPACE/tests/retrieval/fixtures/ \
            --ablation

      - name: Run contradiction evaluation
        working-directory: /tmp/mnemo-bench
        run: |
          mkdir -p /tmp/mnemo-reports
          python3 $GITHUB_WORKSPACE/tests/retrieval/eval_contradiction.py \
            --by-category \
            --report-json /tmp/mnemo-reports/contradiction.json \
            --report-csv /tmp/mnemo-reports/contradiction.csv

      - name: Run weight sensitivity sweep
        working-directory: /tmp/mnemo-bench
        run: |
          python3 $GITHUB_WORKSPACE/tests/retrieval/weight_sweep.py \
            --curve-json /tmp/mnemo-reports/weight_curve.json \
            --curve-csv /tmp/mnemo-reports/weight_curve.csv

      - name: Upload retrieval artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: retrieval-eval-${{ github.run_id }}
          path: /tmp/mnemo-reports
          retention-days: 14

  # ─── Autonomy Python module syntax check ─────────────────────────────────────
  autonomy-syntax:
    name: Autonomy module syntax (py3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install minimal deps for syntax check
        run: pip install --quiet "pyyaml>=6.0"

      - name: Syntax check all autonomy templates
        run: |
          failed=0
          for f in scripts/memory/installer/templates/autonomy/*.py; do
            if ! python3 -m py_compile "$f" 2>&1; then
              echo "SYNTAX ERROR: $f"
              failed=1
            fi
          done
          [ -f scripts/memory/installer/templates/mnemo_vector.py ] && \
            python3 -m py_compile scripts/memory/installer/templates/mnemo_vector.py
          for f in tests/retrieval/*.py; do
            if ! python3 -m py_compile "$f" 2>&1; then
              echo "SYNTAX ERROR: $f"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "All Python files pass syntax check"
