name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─── Windows installer smoke tests ───────────────────────────────────────────
  windows:
    name: Windows (PowerShell ${{ matrix.pwsh }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        pwsh: ["5", "7"]
    steps:
      - uses: actions/checkout@v6

      - name: Select PowerShell version
        shell: pwsh
        run: |
          if ("${{ matrix.pwsh }}" -eq "5") {
            Write-Host "Using Windows PowerShell 5 (default on windows-latest)"
          } else {
            Write-Host "Using PowerShell 7+ (pwsh)"
          }

      - name: Run installer (scratch)
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "mnemo-test"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          powershell -ExecutionPolicy Bypass -File .\memory.ps1 -RepoRoot $dest -ProjectName CITest
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run rebuild + lint
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "mnemo-test"
          powershell -ExecutionPolicy Bypass -File "$dest\scripts\memory\rebuild-memory-index.ps1" -RepoRoot $dest
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          powershell -ExecutionPolicy Bypass -File "$dest\scripts\memory\lint-memory.ps1" -RepoRoot $dest
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Idempotency check (re-run without --Force, expect SKIPs only)
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "mnemo-test"
          $out = powershell -ExecutionPolicy Bypass -File .\memory.ps1 -RepoRoot $dest -ProjectName CITest 2>&1
          $out | Write-Host
          $wrote = $out | Where-Object { $_ -match "^WROTE:" }
          if ($wrote) {
            Write-Error "Idempotency failed: installer overwrote files on second run without -Force:`n$($wrote -join "`n")"
            exit 1
          }

      - name: Idempotency check (re-run with --Force, expect WROTEs)
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "mnemo-test"
          $out = powershell -ExecutionPolicy Bypass -File .\memory.ps1 -RepoRoot $dest -ProjectName CITest -Force 2>&1
          $out | Write-Host
          $wrote = $out | Where-Object { $_ -match "^WROTE:" }
          if (-not $wrote) {
            Write-Error "Force flag had no effect: no files were written."
            exit 1
          }

      - name: Dry-run check (no files created)
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "mnemo-dryrun"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $out = powershell -ExecutionPolicy Bypass -File .\memory.ps1 -RepoRoot $dest -ProjectName CITest -DryRun 2>&1
          $out | Write-Host
          $files = Get-ChildItem -Recurse -File $dest -ErrorAction SilentlyContinue
          if ($files) {
            Write-Error "Dry-run created files: $($files.FullName -join ', ')"
            exit 1
          }

      - name: Path-with-spaces test
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "mnemo with spaces"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          powershell -ExecutionPolicy Bypass -File .\memory.ps1 -RepoRoot $dest -ProjectName CITest
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run full regression test suite
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tests\test-installer.ps1

      - name: Modularization guardrail checks
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tests\test-installer-modularization.ps1

  # ─── macOS / Linux installer smoke tests ─────────────────────────────────────
  posix:
    name: ${{ matrix.os }} (sh)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Run installer (scratch)
        run: |
          dest="$RUNNER_TEMP/mnemo-test"
          mkdir -p "$dest"
          sh ./memory_mac.sh --repo-root "$dest" --project-name CITest

      - name: Run rebuild + lint
        run: |
          dest="$RUNNER_TEMP/mnemo-test"
          sh "$dest/scripts/memory/rebuild-memory-index.sh"
          sh "$dest/scripts/memory/lint-memory.sh"

      - name: Idempotency check (re-run without --force, expect SKIPs only)
        run: |
          dest="$RUNNER_TEMP/mnemo-test"
          out="$(sh ./memory_mac.sh --repo-root "$dest" --project-name CITest 2>&1)"
          echo "$out"
          if echo "$out" | grep -q "^WROTE:"; then
            echo "ERROR: Idempotency failed — installer overwrote files on second run without --force"
            exit 1
          fi

      - name: Idempotency check (re-run with --force, expect WROTEs)
        run: |
          dest="$RUNNER_TEMP/mnemo-test"
          out="$(sh ./memory_mac.sh --repo-root "$dest" --project-name CITest --force 2>&1)"
          echo "$out"
          if ! echo "$out" | grep -q "^WROTE:"; then
            echo "ERROR: --force had no effect — no files were written"
            exit 1
          fi

      - name: Dry-run check (no files created)
        run: |
          dest="$RUNNER_TEMP/mnemo-dryrun"
          mkdir -p "$dest"
          sh ./memory_mac.sh --repo-root "$dest" --project-name CITest --dry-run
          count="$(find "$dest" -type f 2>/dev/null | wc -l | tr -d ' ')"
          if [ "$count" -gt 0 ]; then
            echo "ERROR: Dry-run created $count file(s)"
            find "$dest" -type f
            exit 1
          fi

      - name: Path-with-spaces test
        run: |
          dest="$RUNNER_TEMP/mnemo with spaces"
          mkdir -p "$dest"
          sh ./memory_mac.sh --repo-root "$dest" --project-name CITest

      - name: Run full regression test suite
        run: sh ./tests/test-installer.sh

  # ─── Lint: VERSION file consistency ──────────────────────────────────────────
  version-check:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check VERSION file exists and is valid semver
        run: |
          version="$(cat VERSION | tr -d '[:space:]')"
          echo "VERSION = $version"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "ERROR: VERSION file does not contain a valid semver string"
            exit 1
          fi

      - name: Check CHANGELOG has an [Unreleased] or version entry
        run: |
          if ! grep -q '## \[' CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md has no version sections"
            exit 1
          fi

  # ─── Installer modularization anti-monolith guard ────────────────────────────
  modularization-guard:
    name: Monolith guard (LOC check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check memory.ps1 line count (soft=400, hard=500)
        run: |
          loc=$(wc -l < memory.ps1)
          echo "memory.ps1: $loc lines"
          if [ "$loc" -gt 500 ]; then
            echo "FAIL: memory.ps1 exceeds 500-line hard limit ($loc lines)"
            echo "Move new logic to scripts/memory/installer/features/ or templates/"
            exit 1
          elif [ "$loc" -gt 400 ]; then
            echo "WARN: memory.ps1 exceeds 400-line soft target ($loc lines)"
          fi

      - name: Check memory_mac.sh line count (soft=2800, hard=3200)
        run: |
          loc=$(wc -l < memory_mac.sh)
          echo "memory_mac.sh: $loc lines"
          if [ "$loc" -gt 3200 ]; then
            echo "FAIL: memory_mac.sh exceeds 3200-line hard limit ($loc lines)"
            echo "Consider modularizing into sourced scripts"
            exit 1
          elif [ "$loc" -gt 2800 ]; then
            echo "WARN: memory_mac.sh exceeds 2800-line soft target ($loc lines)"
          fi

      - name: Check no large heredocs in memory.ps1
        run: |
          python3 -c "
          import re, sys
          content = open('memory.ps1', encoding='utf-8').read()
          large = re.findall(r\"@'[\\s\\S]{400,}'@\", content)
          if large:
              print(f'FAIL: {len(large)} large single-quote heredoc(s) found in memory.ps1')
              print('Move them to scripts/memory/installer/templates/')
              sys.exit(1)
          print('No large heredocs found in memory.ps1')
          "

      - name: Verify required module files exist
        run: |
          for f in \
            scripts/memory/installer/bootstrap.ps1 \
            scripts/memory/installer/core/io.ps1 \
            scripts/memory/installer/core/paths.ps1 \
            scripts/memory/installer/core/bridge.ps1 \
            scripts/memory/installer/features/memory_scaffold.ps1 \
            scripts/memory/installer/features/vector_setup.ps1 \
            scripts/memory/installer/features/mcp_setup.ps1 \
            scripts/memory/installer/features/hooks_setup.ps1 \
            scripts/memory/installer/features/gitignore_setup.ps1; do
            if [ ! -f "$f" ]; then
              echo "FAIL: required module file missing: $f"
              exit 1
            fi
          done
          echo "All module files present"

      - name: Verify autonomy template files exist
        run: |
          for f in \
            scripts/memory/installer/templates/autonomy/__init__.py \
            scripts/memory/installer/templates/autonomy/schema.py \
            scripts/memory/installer/templates/autonomy/runner.py \
            scripts/memory/installer/templates/autonomy/ingest_pipeline.py \
            scripts/memory/installer/templates/autonomy/lifecycle_engine.py \
            scripts/memory/installer/templates/autonomy/entity_resolver.py \
            scripts/memory/installer/templates/autonomy/retrieval_router.py \
            scripts/memory/installer/templates/autonomy/reranker.py \
            scripts/memory/installer/templates/autonomy/context_safety.py \
            scripts/memory/installer/templates/autonomy/vault_policy.py \
            scripts/memory/installer/templates/autonomy/policies.yaml; do
            if [ ! -f "$f" ]; then
              echo "FAIL: autonomy template missing: $f"
              exit 1
            fi
          done
          echo "All autonomy templates present"

  # ─── Node.js CLI smoke test ──────────────────────────────────────────────────
  cli-smoke:
    name: CLI smoke test (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "18"

      - name: CLI --help exits 0
        run: node bin/mnemo.js --help

      - name: CLI --yes --dry-run exits 0
        run: |
          dest="$RUNNER_TEMP/cli-dryrun"
          mkdir -p "$dest"
          node bin/mnemo.js --yes --dry-run --repo-root "$dest"

      - name: CLI --yes full install exits 0
        run: |
          dest="$RUNNER_TEMP/cli-install"
          mkdir -p "$dest" && cd "$dest" && git init
          node "$GITHUB_WORKSPACE/bin/mnemo.js" --yes --repo-root "$dest" --project-name CLITest
          test -f "$dest/.mnemo/memory/hot-rules.md" || { echo "FAIL: core files missing"; exit 1; }

  # ─── Retrieval quality benchmark ─────────────────────────────────────────────
  retrieval-quality:
    name: Retrieval quality benchmark
    runs-on: ubuntu-latest
    needs: [version-check]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet "sqlite-vec>=0.1.1" "mcp[cli]>=1.2.0,<2.0" "pyyaml>=6.0"

      - name: Install Mnemo to temp dir
        run: |
          mkdir -p /tmp/mnemo-bench
          sh ./memory_mac.sh --repo-root /tmp/mnemo-bench --project-name BenchTest

      - name: Run benchmark (FTS mode, no API key required)
        working-directory: /tmp/mnemo-bench
        run: |
          python3 $GITHUB_WORKSPACE/tests/retrieval/benchmark_runner.py \
            --fixtures $GITHUB_WORKSPACE/tests/retrieval/fixtures/ \
            --persist-baseline /tmp/bench-metrics.json || true
          echo "Benchmark complete (fixture-only mode)"

  # ─── Autonomy Python module syntax check ─────────────────────────────────────
  autonomy-syntax:
    name: Autonomy module syntax (py3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install minimal deps for syntax check
        run: pip install --quiet "pyyaml>=6.0"

      - name: Syntax check all autonomy templates
        run: |
          failed=0
          for f in scripts/memory/installer/templates/autonomy/*.py; do
            if ! python3 -m py_compile "$f" 2>&1; then
              echo "SYNTAX ERROR: $f"
              failed=1
            fi
          done
          [ -f scripts/memory/installer/templates/mnemo_vector.py ] && \
            python3 -m py_compile scripts/memory/installer/templates/mnemo_vector.py
          for f in tests/retrieval/*.py; do
            if ! python3 -m py_compile "$f" 2>&1; then
              echo "SYNTAX ERROR: $f"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then exit 1; fi
          echo "All Python files pass syntax check"
