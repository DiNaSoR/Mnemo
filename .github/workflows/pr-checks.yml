name: PR Checks

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  changelog-check:
    name: Changelog / version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch enough history to diff against base branch
          fetch-depth: 0

      - name: Verify VERSION is valid semver
        run: |
          version="$(cat VERSION | tr -d '[:space:]')"
          echo "VERSION = $version"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: VERSION file does not contain a valid semver string (got: '$version')"
            exit 1
          fi

      - name: Summarize installer surface changes
        id: parity
        run: |
          changed="$(git diff --name-only origin/${{ github.base_ref }}...HEAD)"
          echo "$changed" | grep -qE '^(bin/mnemo\.js|bin/installer/|scripts/memory/installer/)' || exit 0
          echo "Installer surface changed:"
          echo "$changed" | grep -E '^(bin/mnemo\.js|bin/installer/|scripts/memory/installer/)' || true
          exit 0

      - name: Verify CHANGELOG updated when installers change
        run: |
          installer_changed=0
          git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '^(bin/mnemo\.js|bin/installer/|scripts/memory/installer/|VERSION)$' && installer_changed=1 || true

          if [ "$installer_changed" -eq 1 ]; then
            changelog_changed=0
            git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^CHANGELOG\.md$' && changelog_changed=1 || true
            if [ "$changelog_changed" -eq 0 ]; then
              echo "ERROR: Installer or VERSION changed but CHANGELOG.md was not updated."
              echo "Add an entry under ## [Unreleased] in CHANGELOG.md."
              exit 1
            fi
          fi

  shellcheck:
    name: ShellCheck (installer shell helpers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          additional_files: "tests/test-installer.sh scripts/memory/installer/templates/*.sh scripts/memory/installer/templates/hooks/pre-commit.sh"
          severity: warning

  installer-syntax:
    name: Installer syntax checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check bin/mnemo.js syntax
        shell: pwsh
        run: node --check .\bin\mnemo.js

      - name: Check test-installer.ps1 syntax
        shell: pwsh
        run: |
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path .\tests\test-installer.ps1).Path, [ref]$null, [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "  SYNTAX ERROR: $_" -ForegroundColor Red }
            exit 1
          }
          Write-Host "tests/test-installer.ps1 syntax OK" -ForegroundColor Green
